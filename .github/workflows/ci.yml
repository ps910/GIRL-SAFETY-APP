name: SafeHer CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

jobs:
  # ─── Lint, Type Check, Test ──────────────────────────────────────
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit --skipLibCheck
        continue-on-error: true

      - name: ESLint
        run: npx eslint src/ --ext .ts,.tsx,.js,.jsx --max-warnings 50
        continue-on-error: true

      - name: Unit tests
        run: npx jest --passWithNoTests --ci --coverage
        continue-on-error: true

      - name: Validate Expo config
        run: npx expo config --type public

      - name: Check package versions
        run: npx expo install --check

      - name: Build Cloud Functions
        run: cd functions && npm ci && npm run build
        continue-on-error: true

  # ─── Build Android APK (Preview) ───────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v9
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build APK (preview profile)
        run: eas build --platform android --profile preview --non-interactive

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SafeHer-APK
          path: '*.apk'
          retention-days: 30

  # ─── Build Android AAB (Production) ────────────────────────────
  build-production:
    name: Build Production AAB
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v9
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build AAB (production profile)
        run: eas build --platform android --profile production --non-interactive

      - name: Submit to Google Play (internal track)
        if: success()
        run: eas submit --platform android --profile production --non-interactive
        continue-on-error: true

  # ─── EAS Update (OTA) ──────────────────────────────────────────
  ota-update:
    name: OTA Update
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v9
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Publish OTA update
        run: eas update --branch preview --message "Auto-update from CI"
